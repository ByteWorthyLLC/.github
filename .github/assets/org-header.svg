<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="70%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0F172A"/>

  <!-- Wordmark -->
  <text
    x="640"
    y="148"
    font-family="'Courier New', 'Courier', monospace"
    font-size="72"
    font-weight="600"
    fill="#FAFAF7"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2"
  >{byteworthy}</text>

  <!-- Tagline -->
  <text
    x="640"
    y="198"
    font-family="'Courier New', 'Courier', monospace"
    font-size="20"
    font-weight="400"
    fill="#94A3B8"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0"
  >Production-ready foundations for AI teams.</text>

  <!-- Product dots row: Klienta(amber) Sovra(slate) Clynova(sage) Defend(iron) Lead(terracotta) -->
  <!-- Total span: 5 dots * 12px diameter + 4 gaps * 16px = 60 + 64 = 124px, start at 640 - 62 = 578 -->
  <circle cx="578" cy="244" r="6" fill="#D4A574"/> <!-- Klienta amber -->
  <circle cx="606" cy="244" r="6" fill="#5B7C99"/> <!-- Sovra slate -->
  <circle cx="634" cy="244" r="6" fill="#7A9B7E"/> <!-- Clynova sage -->
  <circle cx="662" cy="244" r="6" fill="#4A4E54"/> <!-- Defend iron -->
  <circle cx="690" cy="244" r="6" fill="#C9785C"/> <!-- Lead terracotta -->

  <!-- Bottom gradient fade -->
  <rect width="1280" height="320" fill="url(#fade)"/>
</svg>
