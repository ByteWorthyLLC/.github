name: Bug report
description: Report a reproducible issue
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Concise description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide exact steps and inputs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Repo, branch/commit, runtime, OS, browser.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant output.
